# GitHub Organization Security Settings Reference
# Apply these settings in GitHub organization settings

# This file documents recommended settings for VoodoOps organization

organization:
  # General
  name: VoodoOps
  description: "DevSecOps, Cloud Security, Python Research & Development"
  company: ""
  blog: ""
  location: ""

  # Security
  security:
    # Require two-factor authentication for all members
    # GitHub UI: Settings > Member privileges > Require two-factor authentication
    require_two_factor: true

    # Require members to have verified email addresses
    # GitHub UI: Settings > Member privileges
    verified_email_required: true

    # Allow forking of repositories
    allow_forking: true

    # Allow creation of internal repositories
    allow_internal_repositories: true

    # Prevent outside collaboration on private repositories
    # GitHub UI: Settings > Moderation options
    restrict_outside_collaboration: false

  # Member Permissions
  member_permissions:
    # Default role for new members
    default_role: "member"  # Options: owner, member

    # Allow members to create repositories
    members_can_create_repos: true

    # Allow members to create public repositories
    members_can_create_public_repos: false

    # Allow members to create private repositories
    members_can_create_private_repos: true

    # Allow members to create internal repositories
    members_can_create_internal_repos: true

    # Allow members to fork repositories
    members_can_fork_private_repos: false

  # Secret Scanning
  secret_scanning:
    # Enable secret scanning for public repositories
    enabled_for_public: true

    # Enable push protection for secret scanning
    push_protection_enabled: true

    # Enable secret scanning for private repositories (requires GitHub Advanced Security)
    enabled_for_private: false

  # Dependabot
  dependabot:
    # Enable Dependabot alerts
    alerts_enabled: true

    # Enable Dependabot security updates
    security_updates_enabled: true

# Repository Settings (per repository)
repository_defaults:
  # Branch protection for default branch
  branch_protection:
    # Require pull request reviews before merging
    require_pull_request_reviews: true
    required_approving_review_count: 1

    # Dismiss stale pull request approvals when new commits are pushed
    dismiss_stale_reviews: true

    # Require the most recent push to be approved
    require_last_push_approval: false

    # Require code owner review
    require_code_owner_review: false

    # Require status checks to pass before merging
    require_status_checks: true

    # Require branches to be up to date before merging
    require_branches_up_to_date: true

    # Allow force pushes
    allow_force_pushes: false

    # Allow deletions
    allow_deletions: false

  # Secret scanning
  secret_scanning: true

  # Dependabot
  dependabot:
    alerts: true
    security_updates: true

# Recommended GitHub Apps to Install
recommended_apps:
  - name: "Dependabot"
    description: "Automated dependency updates"
    url: "https://github.com/apps/dependabot"

  - name: "GitHub Secret Scanning"
    description: "Detects secrets in repositories"
    url: "https://docs.github.com/en/code-security/secret-scanning"

  - name: "Code scanning"
    description: "SAST for vulnerable code patterns"
    url: "https://docs.github.com/en/code-security/code-scanning"
