name: Organization Audit - Scheduled

on:
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Organization Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: organization

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: organization
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run audit
        working-directory: organization
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m gh_audit audit ${{ github.repository_owner }} \
            --output reports/

      - name: List generated reports
        working-directory: organization
        run: find reports -type f -name "*.json" -o -name "*.html" -o -name "*.txt" -o -name "*.md"

      - name: Upload audit reports
        uses: actions/upload-artifact@v3
        with:
          name: audit-reports
          path: organization/reports/
          retention-days: 30

      - name: Comment on issues with findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob');

            // Find latest audit report
            const reports = glob.sync('organization/reports/*/audit-report.json');
            if (reports.length === 0) {
              console.log('No audit reports found');
              return;
            }

            const latestReport = reports[reports.length - 1];
            const report = JSON.parse(fs.readFileSync(latestReport, 'utf8'));

            const summary = report.summary;
            const criticality = summary.critical > 0 ? '⚠️' : '✅';

            const comment = `## 📊 Organization Audit Results ${criticality}

            **Organization**: ${summary.organization}
            **Compliance Score**: ${summary.compliance_score.toFixed(1)}%

            ### Findings Summary
            - 🔴 Critical: ${summary.critical}
            - 🟠 High: ${summary.high}
            - 🟡 Medium: ${summary.medium}
            - 🔵 Low: ${summary.low}
            - ℹ️ Info: ${summary.info}

            **Total**: ${summary.total_findings} findings

            [View detailed report](${report.audit_metadata.timestamp})
            `;

            // Try to find or create an issue for audit results
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['audit'],
              state: 'open',
            });

            if (issues.data.length > 0) {
              // Comment on existing audit issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: comment,
              });
            } else {
              console.log('No existing audit issue found');
              console.log('Consider creating one with: gh issue create --title "Audit Results"');
            }

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: audit
    if: failure()

    steps:
      - name: Report audit failure
        run: |
          echo "⚠️ Organization audit failed"
          echo "Check the workflow logs for details"
